<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Prediction Results</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:0;
            padding:20px;
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:30px;
        }

        .top-info{
            text-align:center;
            margin-bottom:20px;
            font-size:18px;
            font-weight:bold;
        }

        .container{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
            gap:20px;
        }

        .card{
            background:white;
            border-radius:15px;
            padding:15px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            text-align:center;
        }

        .card img{
            width:100%;
            max-height:220px;
            object-fit:cover;
            border-radius:10px;
        }

        .filename{
            margin-top:10px;
            font-weight:bold;
            color:#444;
        }

        .prediction{
            color:#007bff;
            font-size:22px;
            margin:10px 0;
        }

        .confidence{
            color:green;
            font-size:18px;
        }

        .fact{
            margin-top:10px;
            color:#555;
            font-size:15px;
        }

        .back-btn{
            display:block;
            width:200px;
            margin:30px auto;
            text-align:center;
            padding:12px;
            background:#007bff;
            color:white;
            text-decoration:none;
            border-radius:10px;
        }

        .back-btn:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

    <h1>Batch Prediction Results</h1>

    <div class="top-info">
        Total Images Processed: {{ total }}
    </div>

    <div class="container">
        {% for result in results %}
        <div class="card">

            <img src="data:image/jpeg;base64,{{ result.image }}" alt="Animal Image">

            <div class="filename">
                {{ result.filename }}
            </div>

            <div class="prediction">
                {{ result.prediction }}
            </div>

            <div class="confidence">
                Confidence: {{ result.confidence }}%
            </div>

            <div class="fact">
                {{ result.fact }}
            </div>

        </div>
        {% endfor %}
    </div>

    <a href="{{ url_for('dashboard') }}" class="back-btn">
        Back to Dashboard
    </a>

</body>
</html>
