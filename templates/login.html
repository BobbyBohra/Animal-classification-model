<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Animal Classifier</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        h1 { color: #fff; text-align: center; margin-bottom: 8px; font-size: 28px; }
        .subtitle { color: #aaa; text-align: center; margin-bottom: 30px; font-size: 14px; }
        .flash { background: rgba(255,100,100,0.2); border: 1px solid rgba(255,100,100,0.4);
                 color: #ff8080; padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .flash.success { background: rgba(100,255,150,0.1); border-color: rgba(100,255,150,0.3); color: #80ff9f; }
        label { display: block; color: #ccc; margin-bottom: 6px; font-size: 14px; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px 15px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07);
            color: #fff; font-size: 15px; margin-bottom: 20px;
            outline: none; transition: border 0.3s;
        }
        input:focus { border-color: #4fc3f7; }
        button {
            width: 100%; padding: 13px; border-radius: 10px;
            background: linear-gradient(135deg, #4fc3f7, #0288d1);
            color: #fff; font-size: 16px; font-weight: 600;
            border: none; cursor: pointer; transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        .link { text-align: center; margin-top: 20px; color: #aaa; font-size: 14px; }
        .link a { color: #4fc3f7; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
        .emoji { font-size: 40px; text-align: center; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <span class="emoji">🐾</span>
        <h1>Animal Classifier</h1>
        <p class="subtitle">Login to continue</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash {% if 'successful' in message or 'Welcome' in message %}success{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
            <button type="submit">Login</button>
        </form>

        <div class="link">
            Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
        </div>
    </div>
</body>
</html>
